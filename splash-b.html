<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Joshua Castle — Splash B</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .splash-b {
      display: flex;
      min-height: 100vh;
    }
    .splash-b-image {
      flex: 0 0 50%;
      background: url("https://cdn.myportfolio.com/84e7b15d-31d8-42ce-abfa-0a8d13d727e9/b90b40c7-6dcd-45a5-974e-00279b19fc58_rwc_136x409x3297x2478x4096.png?h=39882484ec2875f52f9295058699cdda") center/cover no-repeat;
    }
    .splash-b-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 72px 64px;
      background: #fafafa;
    }
    .splash-b-rule {
      width: 32px;
      height: 2px;
      background: #1a1a1a;
      margin-bottom: 36px;
    }
    .splash-b-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      text-transform: uppercase;
      line-height: 1.05;
      margin-bottom: 24px;
    }
    .splash-b-name .first {
      display: block;
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #0a0a0a;
    }
    .splash-b-name .last {
      display: block;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #0a0a0a;
    }
    .splash-b-role {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 20px;
    }
    .splash-b-tagline {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: #777;
      line-height: 1.75;
      max-width: 400px;
      margin-bottom: 40px;
      border-left: 1px solid #e0e0e0;
      padding-left: 16px;
    }
    .splash-b-buttons {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 40px;
    }
    .splash-b-social {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .splash-b-social a {
      color: #ccc;
      text-decoration: none;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .splash-b-social a:hover { color: #1a1a1a; }
    .splash-b-social svg { height: 18px; width: auto; fill: currentColor; }

    @media (max-width: 768px) {
      .splash-b { flex-direction: column; }
      .splash-b-image { flex: 0 0 40vh; }
      .splash-b-content { padding: 48px 32px; }
    }
  </style>
</head>
<body>
  <section class="splash-b">
    <div class="splash-b-image"></div>
    <div class="splash-b-content">
      <div class="splash-b-rule"></div>
      <div class="splash-b-name">
        <span class="first">Joshua</span>
        <span class="last">Castle</span>
      </div>
      <div class="splash-b-role">Manufacturing Engineer</div>
      <div class="splash-b-tagline">A pragmatic engineer bringing a quality perspective and design for manufacturability at scale knowledge to product realization.</div>
      <div class="splash-b-buttons">

      </div>
