<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Joshua Castle — Splash A</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .splash-a {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      background: url("https://cdn.myportfolio.com/84e7b15d-31d8-42ce-abfa-0a8d13d727e9/b90b40c7-6dcd-45a5-974e-00279b19fc58_rwc_136x409x3297x2478x4096.png?h=39882484ec2875f52f9295058699cdda") center/cover no-repeat;
    }
    .splash-a-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.82) 0%,
        rgba(0,0,0,0.35) 50%,
        rgba(0,0,0,0.10) 100%
      );
    }
    .splash-a-content {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 0 72px 72px;
    }
    .splash-a-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
      margin-bottom: 16px;
    }
    .splash-a-tagline {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      line-height: 1.7;
      max-width: 520px;
      margin-bottom: 36px;
    }
    .splash-a-buttons {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 32px;
    }
    .btn-light {
      display: inline-block;
      padding: 12px 36px;
      border: 1.5px solid #fff;
      text-decoration: none;
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      font-weight: 600;
      text-transform: uppercase;
      border-radius: 40px;
      transition: all 0.2s ease;
    }
    .btn-light:hover { background: #fff; color: #0a0a0a; }
    .btn-light-filled {
      background: #fff;
      color: #0a0a0a;
    }
    .btn-light-filled:hover { background: rgba(255,255,255,0.85); }
    .splash-a-social {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .splash-a-social a {
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .splash-a-social a:hover { color: #fff; }
    .splash-a-social svg { height: 18px; width: auto; fill: currentColor; }
  </style>
</head>
<body>
  <section class="splash-a">
    <div class="splash-a-overlay"></div>
    <div class="splash-a-content">
      <div class="splash-a-name">Joshua Castle</div>

      <div class="splash-a-buttons">
